version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps(pip)"
    groups:
      python-dev:
        patterns:
          - "ruff"
          - "pytest"
          - "pytest-*"
          - "pre-commit"
      python-runtime:
        patterns:
          - "discord.py"
          - "python-dotenv"
          - "PyYAML"
          - "requests"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "deps(actions)"
    groups:
      github-actions:
        patterns:
          - "*"

