name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Do not cancel in-progress runs on main; cancelled runs can briefly mark the badge as failing.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # MIT-licensed CLI binary (not gitleaks-action — that wrapper needs an org license).
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Full history for banner/git-aware checks and thorough secret scanning.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -c "import discord, dotenv, yaml, requests; print('runtime imports ok')"
          ruff --version

      - name: Lint with Ruff
        run: ruff check .

      - name: Format check with Ruff
        run: ruff format --check .

      - name: Validate repository consistency
        run: python tools/validate_repo.py

      - name: Dry-run all announcers
        run: python run_all.py --dry-run --delay 0

      - name: Secret scan (gitleaks)
        run: |
          set -euo pipefail
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ARCHIVE}"
          curl -fsSL "$URL" -o "$ARCHIVE"
          echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
          tar -xzf "$ARCHIVE" gitleaks
          ./gitleaks version
          ./gitleaks detect --source . --verbose --redact

