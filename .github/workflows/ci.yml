name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Do not cancel in-progress runs on main; cancelled runs can briefly mark the badge as failing.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # MIT-licensed CLI binary (not gitleaks-action — that wrapper needs an org license).
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

jobs:
  validate:
    name: Validate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history for banner/git-aware checks (secrets job handles gitleaks).
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit==2.9.0
          python -c "import discord, dotenv, yaml, requests; print('runtime imports ok')"
          ruff --version

      - name: Lint with Ruff
        if: matrix.python-version == '3.12'
        run: ruff check .

      - name: Format check with Ruff
        if: matrix.python-version == '3.12'
        run: ruff format --check .

      - name: Validate repository consistency
        run: python tools/validate_repo.py
        env:
          DISCORD_INVITE_URL: https://example.invalid/discord-invite
          DISCORD_OSEC_APPLICATION_RESULTS_URL: https://example.invalid/application-results

      - name: Unit tests with coverage floor
        run: pytest --cov=common --cov-report=term-missing --cov-fail-under=70

      - name: Dry-run all announcers
        run: python run_all.py --dry-run --delay 0
        env:
          DISCORD_INVITE_URL: https://example.invalid/discord-invite
          DISCORD_OSEC_APPLICATION_RESULTS_URL: https://example.invalid/application-results
          CIA_DRY_RUN: "1"

      - name: Dependency vulnerability audit (pip-audit)
        if: matrix.python-version == '3.12'
        run: |
          pip-audit --strict --progress-spinner off -r requirements.txt
          pip-audit --strict --progress-spinner off -r requirements-dev.txt

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Secret scan (gitleaks)
        run: |
          set -euo pipefail
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ARCHIVE}"
          curl -fsSL "$URL" -o "$ARCHIVE"
          echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
          tar -xzf "$ARCHIVE" gitleaks
          ./gitleaks version
          ./gitleaks detect --source . --verbose --redact

  # Exact name required by branch protection (Settings → Branches → required checks).
  repository:
    name: Validate repository
    needs: [validate, secrets]
    runs-on: ubuntu-latest
    steps:
      - name: All CI legs passed
        run: echo "Matrix validate + gitleaks secrets jobs succeeded."

