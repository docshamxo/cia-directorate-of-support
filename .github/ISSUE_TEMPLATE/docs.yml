name: Documentation
description: Fix or improve docs, README, or runbooks.
title: "[docs] "
labels: ["docs"]
body:
  - type: dropdown
    id: doc
    attributes:
      label: Which doc?
      options:
        - README.md
        - OPS.md
        - docs/ (index or specific file)
        - SECURITY.md / BRAND.md
        - CONTRIBUTING.md
        - Office or config README
        - Other
    validations:
      required: true
  - type: textarea
    id: gap
    attributes:
      label: What is wrong or missing
      description: Quote the confusing section or describe the gap.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
      description: Optional — wording or link you would add.

