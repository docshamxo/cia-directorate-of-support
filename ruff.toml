target-version = "py310"
line-length = 100

[lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "B",
]
ignore = [
  "E501",
]

[lint.per-file-ignores]
# Announcer scripts bootstrap sys.path before importing the shared package.
"ds/*.py" = ["E402"]
"osec/*.py" = ["E402"]
"ote/*.py" = ["E402"]
"grs/*.py" = ["E402"]
"esd/*.py" = ["E402"]

