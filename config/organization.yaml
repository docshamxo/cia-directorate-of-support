ds:
  motto: WE GO AS ONE
  classification: PUBLIC
  about: 'The **Directorate of Support (DS)** is the Agency''s backbone -- internal security,
    physical protection, and officer readiness.


    Subordinate offices secure the institution from within and train the officers who carry
    the mission forward.'
  offices:
  - Office of Training & Education (OTE)
  - Office of Security (OSEC)
osec:
  motto: PROTECT · DETECT · RESPOND
  about: 'The **Office of Security (OSEC)** is the Agency''s internal security force --
    facility protection, access control, and protocol enforcement across CIA sites.


    Two specialized sub-units handle escalated and high-priority protective taskings.'
  sub_units:
  - Global Response Staff (GRS)
  - Executive Security Detail (ESD)
ote:
  motto: SCIENTIA EST LUX LUCIS
  about: The **Office of Training & Education (OTE)** runs the Agency's **Officer Training
    Program** -- recruiting, instructing, and certifying officers before active duty.
  pillars:
  - title: Recruitment & Selection
    description: Screen and onboard applicants into the officer pipeline before training begins.
  - title: Tradecraft Instruction
    description: Core academy curriculum -- fieldcraft, security protocol, and operational
      discipline prior to deployment.
  - title: Continuing Development
    description: Ongoing education and re-certification so active officers stay current with
      Agency standards.
grs:
  about: Rapid-response security element -- high-threat site security, contingency support,
    and protective reinforcement for field operations.
esd:
  about: Close-protection unit for senior leadership and designated principals during travel
    and operations.
