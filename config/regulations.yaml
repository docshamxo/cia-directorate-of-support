title: SERVER REGULATIONS
intro: |
  {eyebrow}

  *{motto} · Marking: {classification}*

  Welcome to the unofficial Roblox community Directorate of Support
  Office of Security Communications Server (roleplay). This is **not affiliated
  with** the US Government or CIA. Maintain professionalism, discipline, and
  operational integrity at all times. Failure to comply may result in administrative
  action, removal, or further discipline.
sections:
  - title: Professional Conduct & Community Standards
    body: |
      **Professional Conduct**
      Conduct yourself respectfully and professionally regardless of rank or affiliation.
      Disrespectful, disruptive, or hostile behavior is prohibited.

      **Discrimination and Harassment**
      Harassment, discrimination, hate speech, threats, or targeted abuse based on race,
      religion, nationality, gender, or any protected characteristic will not be tolerated.

      **Compliance with Discord Policies**
      All members must comply with Discord's Terms of Service and Community Guidelines.
      Discord-policy violations are also server-regulation violations.

      **Spam and Unauthorized Promotion**
      Spamming, flooding, mass messaging, excessive pinging, or advertising communities,
      products, services, Roblox groups, or platforms without Office of Security leadership
      authorization is prohibited.
  - title: Content, Chain of Command & Channels
    body: |
      **Appropriate Content Standards**
      Communications, media, usernames, and profile content must remain appropriate for a
      professional operational environment. NSFW, explicit, graphic, or otherwise
      inappropriate material is prohibited.

      **Chain of Command**
      Respect and follow the established chain of command. Follow lawful supervisory
      directives unless they conflict with server policy or administration.

      **Proper Channel Usage**
      Use channels for their designated purpose. Keep off-topic discussion in approved
      discussion channels.
  - title: Disruptive Behavior & Reporting
    body: |
      **Trolling and Disruptive Behavior**
      Trolling, baiting, flaming, provoking arguments, or intentionally disrupting
      operations or conversations is prohibited.

      **Impersonation**
      Impersonating Office of Security personnel, staff, leadership, or other members is
      forbidden.

      **Reporting Procedures**
      Report operational concerns, misconduct, or rule violations through designated
      channels or to authorized staff.
  - title: Staff Directives, Privacy & Sensitive Topics
    body: |
      **Compliance with Staff Directives**
      Follow instructions from Office of Security staff, moderators, or administrators.
      Administrative decisions are final unless overturned by higher authority.

      **Privacy and Security**
      Sharing personal information, leaking restricted material, doxxing, or compromising
      member privacy or operational security is prohibited.

      **Bot Usage**
      Use bots and automated systems only in designated channels and for approved purposes.

      **Political and Controversial Topics**
      Political debates, extremist content, election discussions, political harassment, or
      inflammatory geopolitical arguments are prohibited.
  - title: Enforcement
    body: |
      **Enforcement Actions**
      Violations may result in warnings, communication restrictions, suspension, removal
      from Office of Security operations, or permanent removal from the community,
      depending on severity and frequency.

      ----------

      Failure to understand these regulations does not exempt personnel from enforcement.
      Presence in this server constitutes acknowledgment of these policies.

