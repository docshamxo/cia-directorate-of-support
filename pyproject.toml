[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cia-directorate-of-support"
version = "1.0.0"
description = "Discord announcer scripts for the CIA Directorate of Support"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "discord.py==2.6.4",
  "python-dotenv==1.2.2",
  "PyYAML==6.0.3",
]

[project.optional-dependencies]
dev = [
  "ruff==0.12.2",
]

[tool.setuptools.packages.find]
include = ["common*"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

